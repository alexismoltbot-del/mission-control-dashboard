<p>Sans vouloir complexifier, la prochaine grosse vague de succès pourrait venir de créations de communauté. </p><div class="twitter-embed" data-attrs="{&quot;url&quot;:&quot;https://twitter.com/gregisenberg/status/1367835147790385155?s=20&quot;,&quot;full_text&quot;:&quot;Community-led companies are the new \&quot;lean startup\&quot;\n\nLean startup: build software, then find community\nCommunity-led: build community, then build software\n\nThe next wave of big consumer companies will be community-led&quot;,&quot;username&quot;:&quot;gregisenberg&quot;,&quot;name&quot;:&quot;GREG ISENBERG&quot;,&quot;profile_image_url&quot;:&quot;&quot;,&quot;date&quot;:&quot;Fri Mar 05 13:51:27 +0000 2021&quot;,&quot;photos&quot;:[],&quot;quoted_tweet&quot;:{},&quot;reply_count&quot;:0,&quot;retweet_count&quot;:246,&quot;like_count&quot;:1284,&quot;impression_count&quot;:0,&quot;expanded_url&quot;:{},&quot;video_url&quot;:null,&quot;belowTheFold&quot;:false}" data-component-name="Twitter2ToDOM"></div><p>On serait donc passé par 3 étapes pour arriver à co-créer avec nos communautés. </p><div class="captioned-image-container"><figure><a class="image-link image2 is-viewable-img" target="_blank" href="https://substackcdn.com/image/fetch/$s_!ODgU!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fbucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com%2Fpublic%2Fimages%2F58710877-5ccb-4dac-8428-ea420fcf248e_1448x760.png" data-component-name="Image2ToDOM"><div class="image2-inset"><picture><source type="image/webp" srcset="https://substackcdn.com/image/fetch/$s_!ODgU!,w_424,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fbucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com%2Fpublic%2Fimages%2F58710877-5ccb-4dac-8428-ea420fcf248e_1448x760.png 424w, https://substackcdn.com/image/fetch/$s_!ODgU!,w_848,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fbucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com%2Fpublic%2Fimages%2F58710877
