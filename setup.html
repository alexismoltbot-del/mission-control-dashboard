<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mission Control — Setup</title>
  <style>
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px; max-width: 420px; text-align: center; }
    h2 { margin: 0 0 8px; font-size: 1.4rem; }
    p { color: #8b949e; font-size: 0.9rem; margin: 0 0 24px; }
    .status { font-size: 1.1rem; padding: 12px; border-radius: 8px; margin-top: 16px; }
    .ok { background: #1a3a1a; color: #56d364; border: 1px solid #238636; }
    .err { background: #3a1a1a; color: #f85149; border: 1px solid #da3633; }
    a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
<div class="box">
  <h2>🎛️ Mission Control</h2>
  <p>Configuration du token GitHub...</p>
  <div id="status" class="status">Chargement...</div>
</div>
<script>
  const hash = window.location.hash.slice(1);
  const params = new URLSearchParams(hash);
  const token = params.get('t');
  const el = document.getElementById('status');

  if (token && token.startsWith('ghp_')) {
    localStorage.setItem('gh_token', token);
    el.className = 'status ok';
    el.innerHTML = '✅ Token sauvegardé !<br><br><a href="/mission-control-dashboard/">→ Ouvrir Mission Control</a>';
    setTimeout(() => window.location = '/mission-control-dashboard/', 2000);
  } else if (localStorage.getItem('gh_token')) {
    el.className = 'status ok';
    el.innerHTML = '✅ Token déjà configuré !<br><br><a href="/mission-control-dashboard/">→ Ouvrir Mission Control</a>';
    setTimeout(() => window.location = '/mission-control-dashboard/', 1500);
  } else {
    el.className = 'status err';
    el.innerHTML = '❌ Aucun token trouvé.<br>Utilise le lien de setup fourni par Bidi.';
  }
</script>
</body>
</html>
